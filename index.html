<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>配货管理系统</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 40px;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card h2 {
      color: #1677ff;
      margin-bottom: 12px;
      font-size: 20px;
    }
    .card p {
      color: #666;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: #1677ff;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #4096ff;
    }
    .btn-secondary {
      background: #52c41a;
      margin-left: 12px;
    }
    .btn-secondary:hover {
      background: #73d13d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 配货管理系统</h1>

    <div class="card">
      <h2>📦 待我配货</h2>
      <p>查看待处理的配货需求，进行调拨、采购、暂缓等操作。</p>
      <a href="./pages/pending-distribution.html" class="btn">进入页面</a>
    </div>

    <div class="card">
      <h2>📋 我的配货单</h2>
      <p>查看已创建的配货单，跟踪配货状态和进度。</p>
      <a href="./pages/my-distribution-order.html" class="btn btn-secondary">进入页面</a>
    </div>

    <div class="card">
      <h2>💡 使用说明</h2>
      <p>
        • <strong>待我配货</strong>：处理新的配货需求<br>
        • <strong>我的配货单</strong>：查看历史配货记录<br>
        • 支持调拨、采购、暂缓等多种操作
      </p>
    </div>
  </div>
</body>
</html>
